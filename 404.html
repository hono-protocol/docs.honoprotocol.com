<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <script>
        // Store the current path so index.html can restore it.
        // This enables Docsify history mode on GitHub Pages.
        sessionStorage.setItem('docsify-redirect', window.location.pathname);
        window.location.replace('/');
    </script>
</head>
<body></body>
</html>
